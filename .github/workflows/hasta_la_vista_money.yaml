name: hasta-la-vista-money

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - main
      - '**'

env:
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  REFRESH_TOKEN_LIFETIME: ${{ secrets.REFRESH_TOKEN_LIFETIME }}
  ACCESS_TOKEN_LIFETIME: ${{ secrets.ACCESS_TOKEN_LIFETIME }}
  REDIS_LOCATION: redis://localhost:6379/1
  GITHUB_WORKFLOW: true

jobs:
  build:
    runs-on: docker
    container:
      image: git.pavlovteam.ru/turtleold/ci-base:${{ matrix.python-version }}
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_TOKEN }}
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:8-alpine
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff==0.12.8 --break-system-packages

      - name: Run ruff check
        run: ruff check --fix

      - name: Run ruff format
        run: ruff format

      - name: Install uv
        run: pip install uv==0.7.13 --break-system-packages

      - name: Generate uv.lock
        run: uv lock

      - name: Install dependencies
        run: uv venv .venv && uv pip install -e '.[dev]'

      - name: Check migrations are up-to-date
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run check
        run: uv run python manage.py check

      - name: Run migrations
        run: uv run python manage.py migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/github_actions
          REDIS_LOCATION: redis://redis:6379/1

      - name: Run Tests with Coverage
        run: make coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/github_actions
          REDIS_LOCATION: redis://redis:6379/1
