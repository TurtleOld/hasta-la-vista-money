name: Create Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        type: string
        description: 'Tag name for the release'
        default: "auto"
      release_title:
        type: string
        description: 'Title of the release'
        default: 'Release'
      prerelease:
        type: boolean
        description: 'Is this a pre-release?'
        default: false

jobs:
  release:
    runs-on: docker
    container:
      image: git.pavlovteam.ru/turtleold/ci-base:latest
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"* %s (%an)" | head -n 10)
          else
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"* %s (%an)")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "$GITHUB_API_URL/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${{ github.ref_name }}\",
              \"name\": \"${{ inputs.release_title || github.ref_name }}\",
              \"body\": $(echo '${{ steps.changelog.outputs.changelog }}' | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read
