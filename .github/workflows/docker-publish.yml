name: Docker

permissions:
  contents: read
  packages: write
  id-token: write

on:
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        image:
          - image_name: ${{ github.repository }}
            dockerfile: docker/production.Dockerfile
            latest_tag: latest
            tag_prefix: ""
            platforms: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image.image_name }}
          tags: |
            type=semver,pattern=${{ matrix.image.tag_prefix }}{{version}},value=${{ inputs.tag_name }}
            type=semver,pattern=${{ matrix.image.tag_prefix }}{{major}}.{{minor}},value=${{ inputs.tag_name }}
            type=raw,value=${{ matrix.image.latest_tag }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.image.image_name }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
