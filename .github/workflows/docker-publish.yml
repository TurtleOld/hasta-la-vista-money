name: Docker

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - '**'
  workflow_dispatch:

env:
  REGISTRY: git.pavlovteam.ru
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: docker
    container:
      image: git.pavlovteam.ru/turtleold/ci-base:3.14
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: theme/static_src/package-lock.json

      - name: Install npm dependencies
        working-directory: theme/static_src
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: theme/static_src
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install uv
        run: pip install uv==0.7.13 --break-system-packages

      - name: Generate uv.lock
        run: uv lock

      - name: Configure Docker credentials store
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ~/.docker
          echo '{"auths": {}}' > ~/.docker/config.json

      - name: Log into registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | \
            docker login ${{ env.REGISTRY }} \
            -u ${{ secrets.REGISTRY_USER }} \
            --password-stdin

      - name: Extract metadata
        id: meta
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          else
            TAGS="${IMAGE}:main,${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name ci-builder || docker buildx use ci-builder

      - name: Build Docker image
        run: |
          docker buildx build \
            --load \
            -t placeholder \
            -f docker/production.Dockerfile \
            --label "org.opencontainers.image.source=https://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            docker tag placeholder "${TAG}"
            docker push "${TAG}"
          done
