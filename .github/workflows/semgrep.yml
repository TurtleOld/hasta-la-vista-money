name: Semgrep

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request: {}
  push:
    branches:
      - main
  schedule:
    - cron: '12 15 * * *'

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: docker
    if: github.actor != 'dependabot[bot]'
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - run: semgrep ci
