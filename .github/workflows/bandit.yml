name: Bandit
permissions:
  contents: read
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '34 8 * * 1'

jobs:
  bandit:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bandit Scan
        uses: shundor/python-bandit-scan@ab1d87dfccc5a0ffab88be3aaac6ffe35c10d6cd
        with:
          exit_zero: true
          # Фикстурные пароли и имена JWT-ключей в тестах дают только
          # ложные B105/B106 — настоящих секретов в тестах нет.
          excluded_paths: '*/tests/*,*/tests.py,*/test_*.py'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
