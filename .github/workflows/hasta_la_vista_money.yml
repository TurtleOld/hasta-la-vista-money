name: hasta-la-vista-money
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  reviewdog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install ruff
        uses: astral-sh/ruff-action@d7f6ad639a4c5114cf48e4459cc6fad582915895
        with:
          version: '0.12.8'

      - name: Install reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f
        with:
          reviewdog_version: v0.21.0

      - name: Run reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -conf=.reviewdog.yml

  build:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
      REFRESH_TOKEN_LIFETIME: ${{ secrets.REFRESH_TOKEN_LIFETIME }}
      ACCESS_TOKEN_LIFETIME: ${{ secrets.ACCESS_TOKEN_LIFETIME }}
      REDIS_LOCATION: redis://localhost:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,host.docker.internal
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      DEBUG: 'false'
      SECURE_SSL_REDIRECT: 'true'
      SESSION_COOKIE_SECURE: 'true'
      CSRF_COOKIE_SECURE: 'true'
      GITHUB_WORKFLOW: true
      CI: true
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ '3.12', '3.13' ]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv and Handle Its Cache
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Generate uv.lock
        run: uv lock

      - name: Install ruff
        uses: astral-sh/ruff-action@d7f6ad639a4c5114cf48e4459cc6fad582915895
        with:
          version: "0.12.8"
      - run: ruff check --fix
      - run: ruff format

      - name: Install dependencies
        run: |
          uv venv .venv && uv pip install -e '.[dev]'

      - name: Check migrations are up-to-date
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Fetch base branch for migration diff
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Detect changed migration files
        id: changed-migrations
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            migration_files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'hasta_la_vista_money/*/migrations/*.py' | tr '\n' ' ')
          else
            migration_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'hasta_la_vista_money/*/migrations/*.py' | tr '\n' ' ')
          fi

          printf 'files=%s\n' "$migration_files" >> "$GITHUB_OUTPUT"

      - name: Check migrations are reversible
        if: steps.changed-migrations.outputs.files != ''
        run: >-
          uv run python .github/scripts/check_migration_reversibility.py
          ${{ steps.changed-migrations.outputs.files }}

      - name: Run check
        run: uv run python manage.py check

      - name: Run deploy check
        run: >-
          uv run python manage.py check --deploy --tag security
          --fail-level WARNING
          --settings=config.django.prod

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run Tests with Coverage
        run: make coverage

  production-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: hlvm-prod-ci
            dockerfile: docker/production.Dockerfile
            smoke_test: true
            port: 8001
          - name: receipt-inference-ci
            dockerfile: receipt_inference/Dockerfile
            smoke_test: false
            port: 8010
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
      REFRESH_TOKEN_LIFETIME: ${{ secrets.REFRESH_TOKEN_LIFETIME }}
      ACCESS_TOKEN_LIFETIME: ${{ secrets.ACCESS_TOKEN_LIFETIME }}
      REDIS_LOCATION: redis://localhost:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,host.docker.internal
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      DEBUG: 'false'
      SECURE_SSL_REDIRECT: 'true'
      SESSION_COOKIE_SECURE: 'true'
      CSRF_COOKIE_SECURE: 'true'
      DJANGO_SETTINGS_MODULE: config.django.prod
      GITHUB_WORKFLOW: true
      CI: true

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build production image
        run: >-
          docker buildx build --file ${{ matrix.image.dockerfile }} --load
          --tag ${{ matrix.image.name }}:${{ github.sha }} .

      - name: Smoke test production container startup
        if: ${{ matrix.image.smoke_test }}
        run: |
          docker run -d \
            --name ${{ matrix.image.name }} \
            --network host \
            -e SECRET_KEY \
            -e DATABASE_URL \
            -e REFRESH_TOKEN_LIFETIME \
            -e ACCESS_TOKEN_LIFETIME \
            -e REDIS_LOCATION \
            -e ALLOWED_HOSTS \
            -e CSRF_TRUSTED_ORIGINS \
            -e DJANGO_SETTINGS_MODULE \
            -e GITHUB_WORKFLOW \
            -e CI \
            ${{ matrix.image.name }}:${{ github.sha }}

          for attempt in $(seq 1 30); do
            if nc -z 127.0.0.1 ${{ matrix.image.port }}; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx '${{ matrix.image.name }}'; then
              break
            fi

            sleep 2
          done

          docker logs ${{ matrix.image.name }}
          exit 1

      - name: Cleanup production smoke container
        if: always()
        run: docker rm -f ${{ matrix.image.name }} || true
