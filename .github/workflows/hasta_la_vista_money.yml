name: hasta-la-vista-money
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  reviewdog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install ruff
        uses: astral-sh/ruff-action@d7f6ad639a4c5114cf48e4459cc6fad582915895
        with:
          version: '0.12.8'

      - name: Install reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f
        with:
          reviewdog_version: v0.21.0

      - name: Run reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -conf=.reviewdog.yml

  build:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
      REFRESH_TOKEN_LIFETIME: ${{ secrets.REFRESH_TOKEN_LIFETIME }}
      ACCESS_TOKEN_LIFETIME: ${{ secrets.ACCESS_TOKEN_LIFETIME }}
      REDIS_LOCATION: redis://localhost:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,host.docker.internal
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      DEBUG: 'false'
      SECURE_SSL_REDIRECT: 'true'
      SESSION_COOKIE_SECURE: 'true'
      CSRF_COOKIE_SECURE: 'true'
      GITHUB_WORKFLOW: true
      CI: true
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ '3.12', '3.13' ]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv and Handle Its Cache
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Generate uv.lock
        run: uv lock

      - name: Install ruff
        uses: astral-sh/ruff-action@d7f6ad639a4c5114cf48e4459cc6fad582915895
        with:
          version: "0.12.8"
      - run: ruff check --fix
      - run: ruff format

      - name: Install dependencies
        run: |
          uv venv .venv && uv pip install -e '.[dev]'

      - name: Check migrations are up-to-date
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Fetch base branch for migration diff
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Detect changed migration files
        id: changed-migrations
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            migration_files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'hasta_la_vista_money/*/migrations/*.py' | tr '\n' ' ')
          else
            migration_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'hasta_la_vista_money/*/migrations/*.py' | tr '\n' ' ')
          fi

          printf 'files=%s\n' "$migration_files" >> "$GITHUB_OUTPUT"

      - name: Check migrations are reversible
        if: steps.changed-migrations.outputs.files != ''
        run: >-
          uv run python .github/scripts/check_migration_reversibility.py
          ${{ steps.changed-migrations.outputs.files }}

      - name: Run check
        run: uv run python manage.py check

      - name: Run deploy check
        run: >-
          uv run python manage.py check --deploy --tag security
          --fail-level WARNING
          --settings=config.django.prod

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run Tests with Coverage
        run: make coverage

  production-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: hlvm-prod-ci
            dockerfile: docker/production.Dockerfile
            smoke_test: django
            port: 8001
          - name: receipt-inference-ci
            dockerfile: receipt_inference/Dockerfile
            smoke_test: receipt-inference
            port: 8010
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
      REFRESH_TOKEN_LIFETIME: ${{ secrets.REFRESH_TOKEN_LIFETIME }}
      ACCESS_TOKEN_LIFETIME: ${{ secrets.ACCESS_TOKEN_LIFETIME }}
      REDIS_LOCATION: redis://localhost:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,host.docker.internal
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      DEBUG: 'false'
      SECURE_SSL_REDIRECT: 'true'
      SESSION_COOKIE_SECURE: 'true'
      CSRF_COOKIE_SECURE: 'true'
      DJANGO_SETTINGS_MODULE: config.django.prod
      GITHUB_WORKFLOW: true
      CI: true

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build production image
        run: >-
          docker buildx build --file ${{ matrix.image.dockerfile }} --load
          --tag ${{ matrix.image.name }}:${{ github.sha }} .

      - name: Smoke test production container startup
        if: ${{ matrix.image.smoke_test == 'django' }}
        run: |
          docker run -d \
            --name ${{ matrix.image.name }} \
            --network host \
            -e SECRET_KEY \
            -e DATABASE_URL \
            -e REFRESH_TOKEN_LIFETIME \
            -e ACCESS_TOKEN_LIFETIME \
            -e REDIS_LOCATION \
            -e ALLOWED_HOSTS \
            -e CSRF_TRUSTED_ORIGINS \
            -e DJANGO_SETTINGS_MODULE \
            -e GITHUB_WORKFLOW \
            -e CI \
            ${{ matrix.image.name }}:${{ github.sha }}

          for attempt in $(seq 1 30); do
            if nc -z 127.0.0.1 ${{ matrix.image.port }}; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx '${{ matrix.image.name }}'; then
              break
            fi

            sleep 2
          done

          docker logs ${{ matrix.image.name }}
          exit 1

      - name: Smoke test receipt-inference runtime
        if: ${{ matrix.image.smoke_test == 'receipt-inference' }}
        run: |
          docker network create receipt-inference-ci

          sed 's/^          //' > receipt_llm_mock.py <<'PY'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json

          MODELS = {
              'object': 'list',
              'data': [
                  {'id': 'Qwen2.5-3B-Instruct-Q5_K_M', 'object': 'model'},
              ],
          }

          CHAT_RESPONSE = {
              'id': 'chatcmpl-mock',
              'object': 'chat.completion',
              'choices': [
                  {
                      'index': 0,
                      'message': {
                          'role': 'assistant',
                          'content': json.dumps({
                              'name_seller': 'Test Shop',
                              'retail_place_address': 'Lenina 1',
                              'retail_place': 'Test Shop',
                              'total_sum': '123.45',
                              'operation_type': 1,
                              'receipt_date': '20.12.2023 15:30',
                              'number_receipt': '12345',
                              'nds10': '0',
                              'nds20': '20.57',
                              'items': [
                                  {
                                      'product_name': 'Milk',
                                      'category': 'Dairy',
                                      'price': '123.45',
                                      'quantity': '1',
                                      'amount': '123.45',
                                  }
                              ],
                          }),
                      },
                      'finish_reason': 'stop',
                  }
              ],
          }

          class Handler(BaseHTTPRequestHandler):
              def _send(self, payload, status=200):
                  body = json.dumps(payload).encode()
                  self.send_response(status)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Content-Length', str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_GET(self):
                  if self.path == '/v1/models':
                      self._send(MODELS)
                      return
                  self._send({'error': 'not found'}, 404)

              def do_POST(self):
                  if self.path == '/v1/chat/completions':
                      self._send(CHAT_RESPONSE)
                      return
                  self._send({'error': 'not found'}, 404)

              def log_message(self, *args):
                  return

          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
          PY

          docker run -d \
            --name receipt-llm \
            --network receipt-inference-ci \
            -v "$PWD/receipt_llm_mock.py:/mock.py:ro" \
            python:3.12-alpine \
            sh -c "python /mock.py"

          docker run -d \
            --name ${{ matrix.image.name }} \
            --network receipt-inference-ci \
            -e RECEIPT_INFERENCE_HOST=0.0.0.0 \
            -e RECEIPT_INFERENCE_PORT=8010 \
            -e LLAMA_SERVER_URL=http://receipt-llm:8080/v1 \
            -e OCR_READINESS_REQUIRED=false \
            -e LLAMA_READINESS_REQUIRED=false \
            -e LLAMA_MODEL_ALIAS=Qwen2.5-3B-Instruct-Q5_K_M \
            ${{ matrix.image.name }}:${{ github.sha }}

          for attempt in $(seq 1 60); do
            if docker exec ${{ matrix.image.name }} python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/ready', timeout=5).read()"; then
              break
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx '${{ matrix.image.name }}'; then
              echo 'receipt-inference container exited early'
              docker logs ${{ matrix.image.name }}
              exit 1
            fi

            if [ "$attempt" -eq 60 ]; then
              echo 'timed out waiting for receipt-inference readiness'
              docker logs receipt-llm
              docker logs ${{ matrix.image.name }}
              exit 1
            fi

            sleep 2
          done

          python3 -c "import base64, pathlib; pathlib.Path('receipt-smoke.png').write_bytes(base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAusB9sotWZYAAAAASUVORK5CYII='))"
          sed 's/^          //' > receipt_inference_smoke.py <<'PY'
          import json
          import urllib.request

          boundary = '----receipt-inference-ci'
          ocr_text = 'Test Shop\n20.12.2023 15:30\nMilk 123.45'
          file_bytes = open('/tmp/receipt-smoke.png', 'rb').read()

          parts = []
          parts.append(
              (
                  f'--{boundary}\r\n'
                  'Content-Disposition: form-data; name="ocr_text"\r\n\r\n'
                  f'{ocr_text}\r\n'
              ).encode()
          )
          parts.append(
              (
                  f'--{boundary}\r\n'
                  'Content-Disposition: form-data; name="file"; '
                  'filename="receipt-smoke.png"\r\n'
                  'Content-Type: image/png\r\n\r\n'
              ).encode() + file_bytes + b'\r\n'
          )
          parts.append(f'--{boundary}--\r\n'.encode())
          body = b''.join(parts)

          request = urllib.request.Request(
              'http://127.0.0.1:8010/v1/receipt/parse',
              data=body,
              headers={
                  'Content-Type': (
                      f'multipart/form-data; boundary={boundary}'
                  )
              },
              method='POST',
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              payload = json.load(response)

          assert payload['success'] is True, payload
          assert payload['data']['name_seller'] == 'Test Shop', payload
          assert payload['data']['items'][0]['product_name'] == 'Milk', payload
          print(json.dumps(payload))
          PY

          docker cp receipt-smoke.png ${{ matrix.image.name }}:/tmp/receipt-smoke.png
          docker cp receipt_inference_smoke.py ${{ matrix.image.name }}:/tmp/receipt_inference_smoke.py
          docker exec ${{ matrix.image.name }} python /tmp/receipt_inference_smoke.py

      - name: Cleanup production smoke container
        if: always()
        run: |
          docker rm -f receipt-llm || true
          docker rm -f ${{ matrix.image.name }} || true
          docker network rm receipt-inference-ci || true
