name: hlvm-dev

services:
  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    ports:
      - "26379:6379"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: ["python", "manage.py", "migrate", "--noinput"]
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
    networks:
      - default
    restart: "no"

  volume-permissions:
    image: alpine:3.22
    command:
      - sh
      - -c
      - chown -R 1000:1000 /app/media /app/staticfiles && chmod -R u+rwX,go+rX /app/media /app/staticfiles
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    networks:
      - default
    restart: "no"

  hlvm-server:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: sh -c "python manage.py collectstatic --noinput --clear && python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./:/app
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      BASE_URL: ${BASE_URL:-http://127.0.0.1:8001}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8001}
      ERROR_TRACKING_DSN: ${ERROR_TRACKING_DSN:-}
      ERROR_TRACKING_ENVIRONMENT: ${ERROR_TRACKING_ENVIRONMENT:-development}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8001),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery-worker:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2 -Q hlvm_tasks
    volumes:
      - ./:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  celery-beat:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ${CONF_PATH:-./nginx}/nginx.conf:/etc/nginx/nginx.conf
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      hlvm-server:
        condition: service_started
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

volumes:
  staticfiles_data:
  redis_data:
  media_data:

networks:
  default:
    driver: bridge
