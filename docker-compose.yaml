name: hlvm-dev

services:
  db:
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hlvm}
    env_file:
      - .env
    ports:
      - "5433:5432"
    restart: always
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    ports:
      - "26379:6379"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hlvm-server:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    volumes:
      - ./:/app
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/hlvm}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      BASE_URL: ${BASE_URL:-http://127.0.0.1:8001}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8001}
      ERROR_TRACKING_DSN: ${ERROR_TRACKING_DSN:-}
      ERROR_TRACKING_ENVIRONMENT: ${ERROR_TRACKING_ENVIRONMENT:-development}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
      RECEIPT_INFERENCE_URL: ${RECEIPT_INFERENCE_URL:-}
      RECEIPT_INFERENCE_TIMEOUT: ${RECEIPT_INFERENCE_TIMEOUT:-420}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8001),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery-worker:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    entrypoint: ["/app/celery-entrypoint.sh"]
    command: celery -A config worker --loglevel=info --concurrency=2 -Q hlvm_tasks
    volumes:
      - ./:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/hlvm}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
      RECEIPT_INFERENCE_URL: ${RECEIPT_INFERENCE_URL:-}
      RECEIPT_INFERENCE_TIMEOUT: ${RECEIPT_INFERENCE_TIMEOUT:-420}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  receipt-inference:
    build:
      context: ./
      dockerfile: receipt_inference/Dockerfile
    image: ghcr.io/turtleold/hasta-la-vista-money:receipt-inference-main
    environment:
      RECEIPT_INFERENCE_HOST: ${RECEIPT_INFERENCE_HOST:-0.0.0.0}
      RECEIPT_INFERENCE_PORT: ${RECEIPT_INFERENCE_PORT:-8010}
      RECEIPT_INFERENCE_LOG_LEVEL: ${RECEIPT_INFERENCE_LOG_LEVEL:-debug}
      RECEIPT_INFERENCE_MAX_CONCURRENCY: ${RECEIPT_INFERENCE_MAX_CONCURRENCY:-1}
      LLAMA_THREADS: ${LLAMA_THREADS:-4}
      OCR_THREADS: ${OCR_THREADS:-2}
      LLAMA_SERVER_URL: ${LLAMA_SERVER_URL:-http://receipt-llm:8080/v1}
      LLAMA_TIMEOUT: ${LLAMA_TIMEOUT:-360}
      LLAMA_MAX_TOKENS: ${LLAMA_MAX_TOKENS:-384}
      LLAMA_MODEL_ALIAS: ${LLAMA_MODEL_ALIAS:-Qwen2.5-3B-Instruct-Q5_K_M}
      MAX_IMAGE_DIMENSION: ${MAX_IMAGE_DIMENSION:-2200}
      JPEG_QUALITY: ${JPEG_QUALITY:-92}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-ru}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-0.5}
      OCR_USE_ANGLE_CLS: ${OCR_USE_ANGLE_CLS:-true}
    volumes:
      - ./receipt_inference:/app/receipt_inference
    ports:
      - "8010:8010"
    depends_on:
      receipt-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  receipt-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - -m
      - ${QWEN_MODEL_PATH:-/models/qwen/qwen2.5-3b-instruct-q5_k_m.gguf}
      - -t
      - ${LLAMA_THREADS:-4}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - ${LLAMA_CONTEXT_SIZE:-8192}
      - -np
      - ${LLAMA_PARALLEL:-1}
      - --alias
      - ${LLAMA_MODEL_ALIAS:-Qwen2.5-3B-Instruct-Q5_K_M}
    volumes:
      - ${RECEIPT_INFERENCE_MODELS_PATH:-./models/receipt-inference}:/models:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -q -O- http://127.0.0.1:8080/v1/models || curl -fsS http://127.0.0.1:8080/v1/models) >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ${CONF_PATH:-./nginx}/nginx.conf:/etc/nginx/nginx.conf
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - hlvm-server
    networks:
      - default
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles_data:
  redis_data:
  media_data:

networks:
  default:
    driver: bridge
