name: hlvm-dev

services:
  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    ports:
      - "26379:6379"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: ["python", "manage.py", "migrate", "--noinput"]
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
    networks:
      - default
    restart: "no"

  volume-permissions:
    image: alpine:3.22
    command:
      - sh
      - -c
      - chown -R 1000:1000 /app/media /app/staticfiles && chmod -R u+rwX,go+rX /app/media /app/staticfiles
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    networks:
      - default
    restart: "no"

  hlvm-server:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: sh -c "python manage.py collectstatic --noinput --clear && python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./:/app
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      BASE_URL: ${BASE_URL:-http://127.0.0.1:8001}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8001}
      ERROR_TRACKING_DSN: ${ERROR_TRACKING_DSN:-}
      ERROR_TRACKING_ENVIRONMENT: ${ERROR_TRACKING_ENVIRONMENT:-development}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
      RECEIPT_INFERENCE_URL: ${RECEIPT_INFERENCE_URL:-http://receipt-inference:8010}
      RECEIPT_INFERENCE_TIMEOUT: ${RECEIPT_INFERENCE_TIMEOUT:-1500}
    depends_on:
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8001),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery-worker:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2 -Q hlvm_tasks
    volumes:
      - ./:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
      RECEIPT_INFERENCE_URL: ${RECEIPT_INFERENCE_URL:-http://receipt-inference:8010}
      RECEIPT_INFERENCE_TIMEOUT: ${RECEIPT_INFERENCE_TIMEOUT:-1500}
    depends_on:
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  celery-beat:
    build:
      context: ./
      dockerfile: docker/local.Dockerfile
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_me}
      REDIS_LOCATION: ${REDIS_LOCATION:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

  receipt-inference:
    build:
      context: ./
      dockerfile: receipt_inference/Dockerfile
    image: ghcr.io/turtleold/hasta-la-vista-money:receipt-inference-main
    environment:
      RECEIPT_INFERENCE_HOST: ${RECEIPT_INFERENCE_HOST:-0.0.0.0}
      RECEIPT_INFERENCE_PORT: ${RECEIPT_INFERENCE_PORT:-8010}
      RECEIPT_INFERENCE_LOG_LEVEL: ${RECEIPT_INFERENCE_LOG_LEVEL:-debug}
      RECEIPT_INFERENCE_BACKEND: ${RECEIPT_INFERENCE_BACKEND:-paddleocr_vl}
      RECEIPT_INFERENCE_MAX_CONCURRENCY: ${RECEIPT_INFERENCE_MAX_CONCURRENCY:-1}
      OCR_THREADS: ${OCR_THREADS:-2}
      PADDLEOCR_VL_MODEL_NAME: ${PADDLEOCR_VL_MODEL_NAME:-}
      MAX_IMAGE_DIMENSION: ${MAX_IMAGE_DIMENSION:-1600}
      MIN_OCR_IMAGE_WIDTH: ${MIN_OCR_IMAGE_WIDTH:-768}
      JPEG_QUALITY: ${JPEG_QUALITY:-85}
      OPTIMIZE_JPEG: ${OPTIMIZE_JPEG:-false}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-ru}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-0.5}
      OCR_DETECTION_MODEL_NAME: ${OCR_DETECTION_MODEL_NAME:-}
      OCR_RECOGNITION_MODEL_NAME: ${OCR_RECOGNITION_MODEL_NAME:-}
      OCR_USE_ANGLE_CLS: ${OCR_USE_ANGLE_CLS:-false}
      OCR_ENABLE_MKLDNN: ${OCR_ENABLE_MKLDNN:-true}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: ${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-True}
    volumes:
      - ./receipt_inference:/app/receipt_inference
      - paddleocr_cache:/home/appuser/.paddlex
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ${CONF_PATH:-./nginx}/nginx.conf:/etc/nginx/nginx.conf
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      hlvm-server:
        condition: service_started
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

volumes:
  staticfiles_data:
  redis_data:
  media_data:
  paddleocr_cache:

networks:
  default:
    driver: bridge
