name: hlvm-prod

services:
  db:
    image: postgres:18.0
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hlvm}
    ports:
      - "5432:5432"
    restart: always
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hlvm-server:
    image: ghcr.io/turtleold/hasta-la-vista-money:main
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hlvm}}
      RECEIPT_INFERENCE_URL: ${RECEIPT_INFERENCE_URL:-}
      RECEIPT_INFERENCE_TIMEOUT: ${RECEIPT_INFERENCE_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import socket; s=socket.create_connection(('localhost',8001),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery-worker:
    image: ghcr.io/turtleold/hasta-la-vista-money:main
    entrypoint: ["/app/celery-entrypoint.sh"]
    command: celery -A config worker --loglevel=info --concurrency=2 -Q hlvm_tasks
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hlvm}}
      RECEIPT_INFERENCE_URL: ${RECEIPT_INFERENCE_URL:-}
      RECEIPT_INFERENCE_TIMEOUT: ${RECEIPT_INFERENCE_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  receipt-inference:
    image: ghcr.io/turtleold/hasta-la-vista-money:receipt-inference-main
    environment:
      RECEIPT_INFERENCE_HOST: ${RECEIPT_INFERENCE_HOST:-0.0.0.0}
      RECEIPT_INFERENCE_PORT: ${RECEIPT_INFERENCE_PORT:-8010}
      RECEIPT_INFERENCE_LOG_LEVEL: ${RECEIPT_INFERENCE_LOG_LEVEL:-info}
      RECEIPT_INFERENCE_MAX_CONCURRENCY: ${RECEIPT_INFERENCE_MAX_CONCURRENCY:-1}
      LLAMA_THREADS: ${LLAMA_THREADS:-2}
      OCR_THREADS: ${OCR_THREADS:-1}
      LLAMA_SERVER_URL: ${LLAMA_SERVER_URL:-http://127.0.0.1:8080/v1}
      LLAMA_TIMEOUT: ${LLAMA_TIMEOUT:-120}
      LLAMA_PORT: ${LLAMA_PORT:-8080}
      LLAMA_CONTEXT_SIZE: ${LLAMA_CONTEXT_SIZE:-8192}
      LLAMA_BATCH_SIZE: ${LLAMA_BATCH_SIZE:-1024}
      LLAMA_PARALLEL: ${LLAMA_PARALLEL:-1}
      LLAMA_MODEL_ALIAS: ${LLAMA_MODEL_ALIAS:-Qwen2.5-3B-Instruct-Q5_K_M}
      QWEN_MODEL_PATH: ${QWEN_MODEL_PATH:-/models/qwen/qwen2.5-3b-instruct-q5_k_m.gguf}
      MAX_IMAGE_DIMENSION: ${MAX_IMAGE_DIMENSION:-2200}
      JPEG_QUALITY: ${JPEG_QUALITY:-92}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-ru}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-0.5}
      OCR_USE_ANGLE_CLS: ${OCR_USE_ANGLE_CLS:-true}
    volumes:
      - ${RECEIPT_INFERENCE_MODELS_PATH:-/opt/docker/hlvm/receipt-inference/models}:/models:ro
    networks:
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    cpus: 1.5
    mem_limit: 4g
    restart: unless-stopped

  nginx:
    image: nginx:1.30.0-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CONF_PATH:-./nginx}/nginx.conf:/etc/nginx/nginx.conf
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - hlvm-server
    networks:
      - default
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles_data:
  redis_data:
  media_data:

networks:
  default:
    driver: bridge
