name: hlvm-prod

services:
  db:
    image: postgres:18.0
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hlvm}
    ports:
      - "5432:5432"
    restart: always
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    image: ghcr.io/turtleold/hasta-la-vista-money:main
    entrypoint: []
    command: ["/app/.venv/bin/python", "manage.py", "migrate", "--noinput"]
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hlvm}}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
    restart: "no"

  volume-permissions:
    image: alpine:3.22
    command:
      - sh
      - -c
      - chown -R 1000:1000 /app/media /app/staticfiles /app/nginx-runtime && chmod -R u+rwX,go+rX /app/media /app/staticfiles /app/nginx-runtime
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
      - nginx_config_data:/app/nginx-runtime
    networks:
      - default
    restart: "no"

  hlvm-server:
    image: ghcr.io/turtleold/hasta-la-vista-money:main
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
      - nginx_config_data:/app/nginx-runtime
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hlvm}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import socket; s=socket.create_connection(('localhost',8001),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery-worker:
    image: ghcr.io/turtleold/hasta-la-vista-money:main
    entrypoint: ["/app/celery-entrypoint.sh"]
    command: celery -A config worker --loglevel=info --concurrency=2 -Q hlvm_tasks
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hlvm}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

  celery-beat:
    image: ghcr.io/turtleold/hasta-la-vista-money:main
    entrypoint: ["/app/celery-entrypoint.sh"]
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hlvm}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

  nginx:
    image: nginx:1.30.0-alpine
    command:
      - /bin/sh
      - -c
      - while [ ! -f /app/nginx/nginx.conf ]; do sleep 1; done; exec nginx -g 'daemon off;' -c /app/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_config_data:/app/nginx:ro
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      hlvm-server:
        condition: service_started
      volume-permissions:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles_data:
  redis_data:
  media_data:
  nginx_config_data:

networks:
  default:
    driver: bridge
