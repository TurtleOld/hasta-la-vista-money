{% load i18n %}
{% load static %}

{% block content %}
    <nav class="sticky top-0 z-50 w-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="navbar" class="flex items-center justify-between h-16">
                <!-- Mobile Menu Toggle -->
                <label class="lg:hidden p-2.5 rounded-xl text-gray-600 dark:text-gray-300 cursor-pointer" role="button" tabindex="0" aria-label="{% translate 'Открыть меню' %}" id="mobileMenuToggle" for="mobileMenuState">
                    <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </label>

                <!-- Logo Section -->
                <div id="account-list" class="flex items-center shrink-0">
                    <a class="flex items-center gap-2" href="{% url 'finance_account:list' %}">
                        <span class="logo font-bold text-xl">Hasta La Vista, Money!</span>
                    </a>
                </div>

                <!-- Navigation Menu -->
                <div class="hidden lg:flex lg:items-center lg:justify-center flex-1 mx-8" id="navbarNav">
                    <ul class="flex items-center space-x-1.5">
                    <!-- Receipts -->
                    <li id="receipts">
                        <a class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium {% if request.path == '/receipts/' %}bg-linear-to-r from-green-600 to-emerald-600 text-green-50 dark:text-white shadow-lg shadow-green-500/30{% else %}text-gray-700 dark:text-gray-300{% endif %}"
                           href="{% url 'receipts:list' %}">
                            <svg class="w-4 h-4 shrink-0" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <span>{% translate "Чеки" %}</span>
                        </a>
                    </li>

                    <!-- Finances -->
                    <li id="finances">
                        <a class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium {% if request.path == '/finance/' %}bg-linear-to-r from-green-600 to-emerald-600 text-green-50 dark:text-white shadow-lg shadow-green-500/30{% else %}text-gray-700 dark:text-gray-300{% endif %}"
                           href="{% url 'finances' %}">
                            <svg class="w-4 h-4 shrink-0" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span>{% translate "Финансы" %}</span>
                        </a>
                    </li>
                    <!-- Budget-->
                    <li id="budget">
                        <a class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium {% if request.path == '/budget/' %}bg-linear-to-r from-green-600 to-emerald-600 text-green-50 dark:text-white shadow-lg shadow-green-500/30{% else %}text-gray-700 dark:text-gray-300{% endif %}"
                            href="{% url 'budget:list' %}">
                        <svg class="w-4 h-4 shrink-0" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span>{% translate 'Бюджет' %}</span>
                        </a>
                    </li>
                    <!-- Loans -->
                    <li id="loans">
                        <a class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium {% if request.path == '/loan/' %}bg-linear-to-r from-green-600 to-emerald-600 text-green-50 dark:text-white shadow-lg shadow-green-500/30{% else %}text-gray-700 dark:text-gray-300{% endif %}"
                           href="{% url 'loan:list' %}">
                            <svg class="w-4 h-4 shrink-0" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                            </svg>
                            <span>{% translate 'Кредиты' %}</span>
                        </a>
                    </li>

                    <!-- Reports -->
                    <li id="reports">
                        <a class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium {% if request.path == '/reports/' %}bg-linear-to-r from-green-600 to-emerald-600 text-green-50 dark:text-white shadow-lg shadow-green-500/30{% else %}text-gray-700 dark:text-gray-300{% endif %}"
                           href="{% url 'reports:list' %}">
                            <svg class="w-4 h-4 shrink-0" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                            <span>{% translate 'Отчёты' %}</span>
                        </a>
                    </li>

                    <!-- Dashboard -->
                    <li id="dashboard">
                        <a class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium {% if request.path == '/users/dashboard/' %}bg-linear-to-r from-green-600 to-emerald-600 text-green-50 dark:text-white shadow-lg shadow-green-500/30{% else %}text-gray-700 dark:text-gray-300{% endif %}"
                           href="{% url 'users:dashboard' %}">
                            <svg class="w-4 h-4 shrink-0" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                            </svg>
                            <span>{% translate "Дашборд" %}</span>
                        </a>
                    </li>
                </ul>

                <!-- User Menu -->
                <div id="user-menu" class="flex items-center ml-4 gap-2">
                    <button id="theme-toggle" type="button" aria-live="polite"
                            class="flex items-center justify-center w-9 h-9 rounded-xl text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
                            aria-label="{% translate 'Сменить тему' %}">
                        <span id="theme-icon" class="flex items-center justify-center w-5 h-5 shrink-0">
                            <svg id="theme-icon-sun" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                            </svg>
                            <svg id="theme-icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                            </svg>
                            <svg id="theme-icon-auto" class="w-5 h-5 hidden" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <text x="12" y="17" text-anchor="middle"
                                      font-family="'Geist', 'Golos Text', system-ui, sans-serif"
                                      font-size="15" font-weight="700" fill="currentColor"
                                      letter-spacing="-0.02em">A</text>
                            </svg>
                        </span>
                        <span id="theme-label" class="sr-only">{% translate 'Авто' %}</span>
                    </button>
                    <a href="{% url 'users:profile' user.id %}" class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium text-gray-700 dark:text-gray-300">
                        <div class="flex items-center justify-center w-9 h-9 rounded-full bg-linear-to-br from-green-500 to-emerald-600 dark:from-green-900/40 dark:to-emerald-900/40 text-white dark:text-green-400 ring-2 ring-green-200 dark:ring-green-800 shadow-md dark:shadow-none">
                            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="background: none; background-color: transparent;">
                                <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <span class="hidden md:block text-sm font-medium">{{ user.username }}</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
{% endblock %}
