{% load i18n %}
<nav class="fixed inset-x-0 bottom-0 z-50 border-t border-gray-200 bg-white/95 backdrop-blur dark:border-gray-700 dark:bg-gray-900/90 md:hidden">
    <div class="mx-auto flex max-w-screen-sm items-center justify-around px-2 py-2">
        <a href="{% url 'finance_account:list' %}" class="flex min-w-[56px] flex-col items-center gap-1 rounded-md px-2 py-1 text-xs font-medium text-gray-500 hover:text-emerald-600 active:scale-95 dark:text-gray-300 dark:hover:text-emerald-400 {% if 'finance_account' in request.path %}text-emerald-600 dark:text-emerald-400{% endif %}">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-2m4-3h-6a2 2 0 00-2 2v0a2 2 0 002 2h6V9z"></path>
            </svg>
            <span class="leading-none">{% translate 'Счета' %}</span>
        </a>

        <a href="{% url 'finances' %}" class="flex min-w-[56px] flex-col items-center gap-1 rounded-md px-2 py-1 text-xs font-medium text-gray-500 hover:text-emerald-600 active:scale-95 dark:text-gray-300 dark:hover:text-emerald-400 {% if request.path == '/finance/' or 'income' in request.path or 'expense' in request.path %}text-emerald-600 dark:text-emerald-400{% endif %}">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
            </svg>
            <span class="leading-none">{% translate 'Финансы' %}</span>
        </a>

        <a href="{% url 'expense:create' %}" class="-mt-6 flex h-14 w-14 items-center justify-center rounded-full bg-gradient-to-br from-emerald-600 to-emerald-400 text-white shadow-lg shadow-emerald-600/30 ring-1 ring-white/20 active:scale-95" id="bottom-nav-fab" data-income-url="{% url 'income:create' %}" data-expense-url="{% url 'expense:create' %}">
            <span id="fab-icon" class="flex h-6 w-6 items-center justify-center"></span>
        </a>

        <a href="{% url 'reports:list' %}" class="flex min-w-[56px] flex-col items-center gap-1 rounded-md px-2 py-1 text-xs font-medium text-gray-500 hover:text-emerald-600 active:scale-95 dark:text-gray-300 dark:hover:text-emerald-400 {% if 'reports' in request.path %}text-emerald-600 dark:text-emerald-400{% endif %}">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
            <span class="leading-none">{% translate 'Отчёты' %}</span>
        </a>

        <a href="{% url 'receipts:list' %}" class="flex min-w-[56px] flex-col items-center gap-1 rounded-md px-2 py-1 text-xs font-medium text-gray-500 hover:text-emerald-600 active:scale-95 dark:text-gray-300 dark:hover:text-emerald-400 {% if 'receipts' in request.path %}text-emerald-600 dark:text-emerald-400{% endif %}">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14h6m-6-4h6m-7 12l-2 1V2l2 1 2-1 2 1 2-1 2 1 2-1v21l-2-1-2 1-2-1-2 1-2-1z"></path>
            </svg>
            <span class="leading-none">{% translate 'Чеки' %}</span>
        </a>
    </div>
</nav>
