{% load i18n %}
<span id="pending-receipts-count-value" class="hidden">{{ count }}</span>
{% if count %}
    <span class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-semibold text-amber-800 dark:text-amber-300 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-full"
          title="{% translate 'Чеков в обработке' %}">
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
        {% blocktranslate count counter=count %}{{ counter }} в обработке{% plural %}{{ counter }} в обработке{% endblocktranslate %}
    </span>
{% endif %}
