{% load i18n %}
<span id="pending-receipts-count-value" class="hidden">{{ count }}</span>
{% if count %}
    <span class="pending-counter" title="{% translate 'Чеков в обработке' %}">
        <svg class="pending-counter-spin" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
        {% blocktranslate count counter=count %}{{ counter }} в обработке{% plural %}{{ counter }} в обработке{% endblocktranslate %}
    </span>
{% else %}
    <span class="receipts-muted">—</span>
{% endif %}
