{% load i18n %}

<div class="loan-panel loan-form-container mb-4">
    <div class="loan-card-head">
        <h6 class="m-0 font-bold">
            <i class="bi bi-download mr-2"></i>{% translate 'Экспорт данных' %}
        </h6>
    </div>
    <div class="loan-card-body">
        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <h6 class="font-bold">{% translate 'Экспорт кредитов' %}</h6>
                <p class="loan-muted text-sm">{% translate 'Скачайте список всех ваших кредитов в формате CSV' %}</p>
                <button class="loan-button loan-button-info" id="export-loans">
                    <i class="bi bi-file-earmark-text mr-2"></i>{% translate 'Экспорт кредитов' %}
                </button>
            </div>
            <div>
                <h6 class="font-bold">{% translate 'Экспорт графика платежей' %}</h6>
                <p class="loan-muted text-sm">{% translate 'Скачайте детальный график платежей по выбранному кредиту' %}</p>
                <select class="mb-2 w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 shadow-sm focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-500/30 dark:border-gray-600 dark:bg-gray-700 dark:text-white" id="export-loan-select">
                    <option value="">{% translate 'Выберите кредит...' %}</option>
                    {% for item_loan in loan %}
                    <option value="{{ item_loan.pk }}">{% translate 'Кредит №' %} {{ item_loan.pk }}</option>
                    {% endfor %}
                </select>
                <button class="loan-button loan-button-secondary" id="export-schedule" disabled>
                    <i class="bi bi-calendar3 mr-2"></i>{% translate 'Экспорт графика' %}
                </button>
            </div>
        </div>
    </div>
</div>
