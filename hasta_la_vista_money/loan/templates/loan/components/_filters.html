{% load i18n %}

<div class="loan-panel loan-form-container mb-4">
    <div class="loan-card-head">
        <h6 class="m-0 font-bold">
            <i class="bi bi-funnel mr-2"></i>{% translate 'Фильтры и поиск' %}
        </h6>
    </div>
    <div class="loan-card-body">
        <div class="grid gap-4 md:grid-cols-12">
            <div class="md:col-span-4">
                <label for="loan-search" class="block text-sm font-medium text-gray-700 dark:text-gray-200">{% translate 'Поиск по номеру' %}</label>
                <div class="mt-1 flex rounded-xl border border-gray-300 bg-white shadow-sm dark:border-gray-600 dark:bg-gray-700">
                    <span class="inline-flex items-center px-3 text-gray-400"><i class="bi bi-search"></i></span>
                    <input type="text" class="w-full rounded-r-xl border-0 bg-transparent px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500/30 dark:text-white" id="loan-search" placeholder="{% translate 'Введите номер кредита...' %}">
                </div>
            </div>
            <div class="md:col-span-3">
                <label for="status-filter" class="block text-sm font-medium text-gray-700 dark:text-gray-200">{% translate 'Статус' %}</label>
                <select class="mt-1 w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 shadow-sm focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-500/30 dark:border-gray-600 dark:bg-gray-700 dark:text-white" id="status-filter">
                    <option value="all">{% translate 'Все кредиты' %}</option>
                    <option value="Аннуитетный">{% translate 'Аннуитетные' %}</option>
                    <option value="Дифференцированный">{% translate 'Дифференцированные' %}</option>
                </select>
            </div>
            <div class="md:col-span-3">
                <label for="sort-loans" class="block text-sm font-medium text-gray-700 dark:text-gray-200">{% translate 'Сортировка' %}</label>
                <select class="mt-1 w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 shadow-sm focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-500/30 dark:border-gray-600 dark:bg-gray-700 dark:text-white" id="sort-loans">
                    <option value="default">{% translate 'По умолчанию' %}</option>
                    <option value="amount">{% translate 'По сумме (убывание)' %}</option>
                    <option value="rate">{% translate 'По ставке (убывание)' %}</option>
                    <option value="period">{% translate 'По сроку (возрастание)' %}</option>
                </select>
            </div>
            <div class="flex items-end md:col-span-2">
                <button class="loan-button loan-button-secondary w-full" id="clear-filters">
                    <i class="bi bi-x-circle mr-1"></i>{% translate 'Сбросить' %}
                </button>
            </div>
        </div>
    </div>
</div>
