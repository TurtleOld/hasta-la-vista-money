{% extends 'base.html' %}
{% load i18n %}
{% block title %}Удалить пользователя из семьи{% endblock %}
{% block content %}
<div class="mx-auto mt-4 max-w-3xl px-4">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Удалить пользователя из семьи</h2>
    <form method="post" id="delete-user-from-group-form">
        {% csrf_token %}
        {% include 'forms/_form.html' with form=form %}
        <button type="submit" class="inline-flex items-center justify-center rounded-full bg-green-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500/40">{% translate "Удалить" %}</button>
    </form>
</div>
{% endblock %}
