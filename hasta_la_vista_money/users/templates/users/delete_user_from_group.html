{% extends 'base.html' %}
{% load i18n %}
{% block title %}Удалить пользователя из семьи{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Удалить пользователя из семьи</h2>
    <form method="post" id="delete-user-from-group-form">
        {% csrf_token %}
        {% include 'forms/_form.html' with form=form %}
        <button type="submit" class="btn btn-success">{% translate "Удалить" %}</button>
    </form>
</div>
{% endblock %}
